<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="250" style="background: transparent;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d19" />
      <stop offset="100%" stop-color="#15182e" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#7b2cbf" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
    
    <!-- Rarity Gradients & Borders -->
    <linearGradient id="rarity-legendary" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe259" />
      <stop offset="100%" stop-color="#ffa751" />
    </linearGradient>
    <linearGradient id="rarity-epic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b06ab3" />
      <stop offset="100%" stop-color="#4568dc" />
    </linearGradient>
    <linearGradient id="rarity-rare" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <linearGradient id="rarity-common" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#56ab2f" />
      <stop offset="100%" stop-color="#a8e063" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .title { font-family: 'Courier New', Courier, monospace; font-weight: bold; fill: #00f0ff; letter-spacing: 2px; font-size: 14px; }
    .slot-bg { fill: #101223; stroke: #202442; stroke-width: 2; }
    .item-title { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 9px; fill: #ffffff; font-weight: bold; text-anchor: middle; }
    .item-level { font-family: 'Courier New', monospace; font-size: 8px; fill: #8b9bb4; font-weight: bold; }
    .rarity-tag { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 7px; font-weight: 800; text-anchor: middle; }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
    .legendary-glow { filter: drop-shadow(0px 0px 4px #ffa751); }
    .epic-glow { filter: drop-shadow(0px 0px 4px #b06ab3); }
    .rare-glow { filter: drop-shadow(0px 0px 4px #00c6ff); }
  </style>

  <!-- Card Background -->
  <rect x="5" y="5" width="590" height="240" rx="15" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="3" filter="url(#neon-glow)" />

  <!-- Grid Decoration in Background -->
  <g opacity="0.03">
    <path d="M 0,40 L 600,40 M 0,80 L 600,80 M 0,120 L 600,120 M 0,160 L 600,160 M 0,200 L 600,200" stroke="#ffffff" stroke-width="1" />
    <path d="M 80,0 L 80,250 M 160,0 L 160,250 M 240,0 L 240,250 M 320,0 L 320,250 M 400,0 L 400,250 M 480,0 L 480,250" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(25, 30)">
    <text x="0" y="0" class="title">🎒 INVENTORY (EQUIPPED GEAR)</text>
    <line x1="0" y1="8" x2="550" y2="8" stroke="#202442" stroke-width="2" />
  </g>

  <!-- Slots Grid -->
  <!-- Row 1 -->
  <!-- Slot 1: JavaScript (Legendary) -->
  <g transform="translate(25, 55)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-legendary)" stroke-width="2" class="legendary-glow" />
    <!-- Icon (Sword) -->
    <path d="M 15 20 L 35 40 M 35 40 L 40 35 M 35 40 L 30 45" stroke="#ffa751" stroke-width="2" stroke-linecap="round" fill="none" />
    <circle cx="15" cy="20" r="2" fill="#fff" />
    <text x="57" y="30" class="item-title">JAVASCRIPT</text>
    <text x="57" y="45" class="rarity-tag" fill="#ffa751">LEGENDARY WEAPON</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 85 / DMG: 920</text>
  </g>

  <!-- Slot 2: HTML5 & CSS3 (Epic) -->
  <g transform="translate(160, 55)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-epic)" stroke-width="2" class="epic-glow" />
    <!-- Icon (Shield) -->
    <path d="M 25 15 L 35 25 L 30 40 L 20 40 L 15 25 Z" fill="none" stroke="#b06ab3" stroke-width="2" />
    <text x="57" y="30" class="item-title">HTML5 / CSS3</text>
    <text x="57" y="45" class="rarity-tag" fill="#b06ab3">EPIC BASTION</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 90 / DEF: 880</text>
  </g>

  <!-- Slot 3: UI/UX & Canva (Legendary) -->
  <g transform="translate(295, 55)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-legendary)" stroke-width="2" class="legendary-glow" />
    <!-- Icon (Magic Ring) -->
    <circle cx="25" cy="25" r="10" fill="none" stroke="#ffa751" stroke-width="2" />
    <circle cx="25" cy="25" r="4" fill="#ffa751" />
    <text x="57" y="30" class="item-title">CANVA &amp; UI/UX</text>
    <text x="57" y="45" class="rarity-tag" fill="#ffa751">LEGENDARY RING</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 92 / AURA: +15%</text>
  </g>

  <!-- Slot 4: AI & Gemini (Legendary) -->
  <g transform="translate(430, 55)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-legendary)" stroke-width="2" class="legendary-glow" />
    <!-- Icon (Crown/Helm) -->
    <path d="M 15 35 L 20 20 L 25 28 L 30 20 L 35 35 Z" fill="none" stroke="#ffa751" stroke-width="2" />
    <text x="57" y="30" class="item-title">AI &amp; GEMINI</text>
    <text x="57" y="45" class="rarity-tag" fill="#ffa751">LEGENDARY CROWN</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 88 / INT: +30</text>
  </g>

  <!-- Row 2 -->
  <!-- Slot 5: Netlify & Git (Rare) -->
  <g transform="translate(25, 145)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-rare)" stroke-width="2" class="rare-glow" />
    <!-- Icon (Boots) -->
    <path d="M 15 20 L 22 20 L 28 35 L 20 35 Z M 22 35 L 22 40 L 15 40" fill="none" stroke="#00c6ff" stroke-width="2" />
    <text x="57" y="30" class="item-title">NETLIFY &amp; GIT</text>
    <text x="57" y="45" class="rarity-tag" fill="#00c6ff">RARE BOOTS</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 80 / SPD: +50</text>
  </g>

  <!-- Slot 6: Responsive Design (Epic) -->
  <g transform="translate(160, 145)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-epic)" stroke-width="2" class="epic-glow" />
    <!-- Icon (Cloak) -->
    <path d="M 20 15 L 30 15 L 35 40 L 15 40 Z" fill="none" stroke="#b06ab3" stroke-width="2" />
    <text x="57" y="30" class="item-title">RESPONSIVE DESIGN</text>
    <text x="57" y="45" class="rarity-tag" fill="#b06ab3">EPIC CLOAK</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 88 / DODGE: +25%</text>
  </g>

  <!-- Slot 7: Product Strategy (Rare) -->
  <g transform="translate(295, 145)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-rare)" stroke-width="2" class="rare-glow" />
    <!-- Icon (Codex) -->
    <rect x="18" y="18" width="14" height="18" rx="2" fill="none" stroke="#00c6ff" stroke-width="2" />
    <line x1="22" y1="22" x2="28" y2="22" stroke="#00c6ff" stroke-width="2" />
    <line x1="22" y1="26" x2="28" y2="26" stroke="#00c6ff" stroke-width="2" />
    <text x="57" y="30" class="item-title">PRODUCT STRATEGY</text>
    <text x="57" y="45" class="rarity-tag" fill="#00c6ff">RARE CODEX</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 82 / WIS: +20</text>
  </g>

  <!-- Slot 8: Testing & Ops (Common) -->
  <g transform="translate(430, 145)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-common)" stroke-width="2" />
    <!-- Icon (Potion) -->
    <path d="M 22 20 L 28 20 M 25 20 L 25 25 M 20 28 L 30 28 L 30 38 L 20 38 Z" fill="none" stroke="#56ab2f" stroke-width="2" />
    <text x="57" y="30" class="item-title">TESTING &amp; OPTIM</text>
    <text x="57" y="45" class="rarity-tag" fill="#56ab2f">COMMON POTION</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 75 / RESTORE: 100</text>
  </g>
</svg>
