<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="250" style="background: transparent;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="sakura-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0f16" />
      <stop offset="100%" stop-color="#2d1520" />
    </linearGradient>
    <linearGradient id="sakura-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb7c5" />
      <stop offset="50%" stop-color="#ff8fa3" />
      <stop offset="100%" stop-color="#ffe3e8" />
    </linearGradient>
    
    <!-- Rarity Colors -->
    <linearGradient id="rarity-legendary" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe259" />
      <stop offset="100%" stop-color="#ffa751" />
    </linearGradient>
    <linearGradient id="rarity-epic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8fa3" />
      <stop offset="100%" stop-color="#ffccd5" />
    </linearGradient>
    <linearGradient id="rarity-rare" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8bbff" />
      <stop offset="100%" stop-color="#b5179e" />
    </linearGradient>
    <linearGradient id="rarity-common" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fae0e4" />
      <stop offset="100%" stop-color="#ffccd5" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="sakura-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Sakura Petal Shape -->
    <g id="petal">
      <path d="M 0 0 C -3 -6, -6 -10, 0 -15 C 6 -10, 3 -6, 0 0" fill="#ffb7c5" opacity="0.8" />
    </g>
    <!-- Sakura Blossom -->
    <g id="blossom">
      <use href="#petal" transform="rotate(0)" />
      <use href="#petal" transform="rotate(72)" />
      <use href="#petal" transform="rotate(144)" />
      <use href="#petal" transform="rotate(216)" />
      <use href="#petal" transform="rotate(288)" />
      <circle cx="0" cy="0" r="2.5" fill="#fff" opacity="0.9" />
    </g>
  </defs>

  <style>
    .title { font-family: 'Georgia', serif; font-style: italic; font-weight: bold; fill: #ffb7c5; letter-spacing: 2px; font-size: 14px; }
    .slot-bg { fill: #2a1622; stroke: #3e1f31; stroke-width: 1.5; }
    .item-title { font-family: 'Segoe UI', sans-serif; font-size: 9px; fill: #ffffff; font-weight: bold; text-anchor: middle; }
    .item-level { font-family: 'Courier New', monospace; font-size: 8px; fill: #d4a3b8; font-weight: bold; }
    .rarity-tag { font-family: 'Segoe UI', sans-serif; font-size: 7px; font-weight: 800; text-anchor: middle; }
    .legendary-glow { filter: drop-shadow(0px 0px 3px #ffa751); }
    .epic-glow { filter: drop-shadow(0px 0px 3px #ff8fa3); }
    .rare-glow { filter: drop-shadow(0px 0px 3px #d8bbff); }
  </style>

  <!-- Card Background -->
  <rect x="5" y="5" width="590" height="240" rx="18" fill="url(#sakura-bg)" stroke="url(#sakura-border)" stroke-width="2.5" filter="url(#sakura-glow)" />

  <!-- Corner blossoms -->
  <use href="#blossom" x="25" y="25" transform="scale(1)" />
  <use href="#blossom" x="575" y="25" transform="scale(1)" />
  <use href="#blossom" x="25" y="225" transform="scale(1)" />
  <use href="#blossom" x="575" y="225" transform="scale(1)" />

  <!-- Title -->
  <g transform="translate(45, 30)">
    <text x="0" y="0" class="title">🎒 SAKURA INVENTORY (EQUIPPED GRACE)</text>
    <path d="M 0 8 L 510 8" stroke="#3e1f31" stroke-width="1.5" />
  </g>

  <!-- Slots Grid -->
  <!-- Row 1 -->
  <!-- Slot 1: JavaScript (Legendary) -->
  <g transform="translate(25, 55)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-legendary)" stroke-width="1.5" class="legendary-glow" />
    <use href="#blossom" x="25" y="30" transform="scale(0.85)" fill="#ffa751" />
    <text x="57" y="30" class="item-title">JAVASCRIPT</text>
    <text x="57" y="45" class="rarity-tag" fill="#ffa751">LEGENDARY ARTIFACT</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 85 / GRACE: 920</text>
  </g>

  <!-- Slot 2: HTML5 & CSS3 (Epic) -->
  <g transform="translate(160, 55)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-epic)" stroke-width="1.5" class="epic-glow" />
    <use href="#blossom" x="25" y="30" transform="scale(0.85)" fill="#ffccd5" />
    <text x="57" y="30" class="item-title">HTML5 / CSS3</text>
    <text x="57" y="45" class="rarity-tag" fill="#ff8fa3">EPIC SHIELD</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 90 / SHIELD: 880</text>
  </g>

  <!-- Slot 3: UI/UX & Canva (Legendary) -->
  <g transform="translate(295, 55)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-legendary)" stroke-width="1.5" class="legendary-glow" />
    <use href="#blossom" x="25" y="30" transform="scale(0.85)" fill="#ffa751" />
    <text x="57" y="30" class="item-title">CANVA &amp; UI/UX</text>
    <text x="57" y="45" class="rarity-tag" fill="#ffa751">LEGENDARY AMULET</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 92 / FOCUS: +15%</text>
  </g>

  <!-- Slot 4: AI & Gemini (Legendary) -->
  <g transform="translate(430, 55)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-legendary)" stroke-width="1.5" class="legendary-glow" />
    <use href="#blossom" x="25" y="30" transform="scale(0.85)" fill="#ffa751" />
    <text x="57" y="30" class="item-title">AI &amp; GEMINI</text>
    <text x="57" y="45" class="rarity-tag" fill="#ffa751">LEGENDARY HEIRLOOM</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 88 / INTEL: +30</text>
  </g>

  <!-- Row 2 -->
  <!-- Slot 5: Netlify & Git (Rare) -->
  <g transform="translate(25, 145)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-rare)" stroke-width="1.5" class="rare-glow" />
    <use href="#blossom" x="25" y="30" transform="scale(0.85)" fill="#d8bbff" />
    <text x="57" y="30" class="item-title">NETLIFY &amp; GIT</text>
    <text x="57" y="45" class="rarity-tag" fill="#d8bbff">RARE TALISMAN</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 80 / SPEED: +50</text>
  </g>

  <!-- Slot 6: Responsive Design (Epic) -->
  <g transform="translate(160, 145)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-epic)" stroke-width="1.5" class="epic-glow" />
    <use href="#blossom" x="25" y="30" transform="scale(0.85)" fill="#ffccd5" />
    <text x="57" y="30" class="item-title">RESPONSIVE DESIGN</text>
    <text x="57" y="45" class="rarity-tag" fill="#ff8fa3">EPIC KIMONO</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 88 / EVADE: +25%</text>
  </g>

  <!-- Slot 7: Product Strategy (Rare) -->
  <g transform="translate(295, 145)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-rare)" stroke-width="1.5" class="rare-glow" />
    <use href="#blossom" x="25" y="30" transform="scale(0.85)" fill="#d8bbff" />
    <text x="57" y="30" class="item-title">PRODUCT STRATEGY</text>
    <text x="57" y="45" class="rarity-tag" fill="#d8bbff">RARE SCROLL</text>
    <text x="57" y="60" class="item-level" text-anchor="middle">LV. 82 / MIND: +20</text>
  </g>

  <!-- Slot 8: Testing & Ops (Common) -->
  <g transform="translate(430, 145)">
    <rect x="0" y="0" width="115" height="75" rx="8" class="slot-bg" />
    <rect x="2" y="2" width="111" height="71" rx="6" fill="none" stroke="url(#rarity-common)" stroke-width="1.5" />
    <use href="#blossom" x="25" y="30" transform="scale(0.85)" fill="#fae0e4" />
    <text x="57" y="30" class="item-title">TESTING &amp; OPTIM</text>
    <text x="57" y="45" class="rarity-tag" fill="#8b9bb4">COMMON POTION</text>
    <text x="57" y="70" class="item-level" text-anchor="middle">LV. 75 / RESTORE: 100</text>
  </g>
</svg>
