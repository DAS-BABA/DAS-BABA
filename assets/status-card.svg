<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="300" style="background: transparent;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d19" />
      <stop offset="100%" stop-color="#15182e" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="50%" stop-color="#7b2cbf" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
    <linearGradient id="hp-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="100%" stop-color="#00ff87" />
    </linearGradient>
    <linearGradient id="mp-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
    <linearGradient id="xp-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9f1c" />
      <stop offset="100%" stop-color="#ffbf00" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .title { font-family: 'Courier New', Courier, monospace; font-weight: bold; fill: #00f0ff; letter-spacing: 2px; }
    .label { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 11px; fill: #8b9bb4; font-weight: 600; text-transform: uppercase; }
    .value { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #ffffff; font-weight: bold; }
    .header-text { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 20px; font-weight: 900; fill: #ffffff; letter-spacing: 1px; }
    .class-text { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #ff007f; font-weight: 800; letter-spacing: 2px; }
    .stat-bar { rx: 3; ry: 3; }
    .stat-label { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #e2e8f0; font-weight: bold; }
    .stat-val { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #00f0ff; font-weight: bold; }
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
    .glitch { animation: pulse 2s infinite; }
  </style>

  <!-- Card Background -->
  <rect x="5" y="5" width="590" height="290" rx="15" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="3" filter="url(#neon-glow)" />

  <!-- Grid Decoration in Background -->
  <g opacity="0.05">
    <path d="M 0,50 L 600,50 M 0,100 L 600,100 M 0,150 L 600,150 M 0,200 L 600,200 M 0,250 L 600,250" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Decorative Corner Brackets -->
  <path d="M 20 25 L 40 25 M 20 25 L 20 45" stroke="#ff007f" stroke-width="3" fill="none" />
  <path d="M 580 25 L 560 25 M 580 25 L 580 45" stroke="#ff007f" stroke-width="3" fill="none" />
  <path d="M 20 275 L 40 275 M 20 275 L 20 255" stroke="#00f0ff" stroke-width="3" fill="none" />
  <path d="M 580 275 L 560 275 M 580 275 L 580 255" stroke="#00f0ff" stroke-width="3" fill="none" />

  <!-- Player Header -->
  <g transform="translate(40, 45)">
    <!-- Level Badge -->
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#1e223d" stroke="#ff007f" stroke-width="2" />
    <text x="30" y="24" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" font-weight="bold" fill="#ff007f">LEVEL</text>
    <text x="30" y="50" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="900" fill="#ffffff">21</text>

    <!-- Name and Class -->
    <text x="75" y="22" class="header-text">DAS-BABA</text>
    <text x="75" y="42" class="class-text">FULL-STACK SORCERER // AI ALCHEMIST</text>
    <rect x="75" y="48" width="120" height="4" rx="2" fill="#00f0ff" opacity="0.7" />
  </g>

  <!-- Flashing "ONLINE" HUD marker -->
  <g transform="translate(480, 40)" class="glitch">
    <circle cx="10" cy="10" r="5" fill="#39ff14" filter="url(#cyan-glow)" />
    <text x="22" y="14" font-family="monospace" font-size="10" font-weight="bold" fill="#39ff14">STATUS: ACTIVE</text>
  </g>

  <!-- Left Side: RPG Gauges (HP / MP / XP) -->
  <g transform="translate(40, 130)">
    <!-- HP Gauge -->
    <text x="0" y="12" class="label" fill="#ff007f">HP</text>
    <rect x="40" y="2" width="220" height="12" rx="3" fill="#151726" stroke="#2b2e4a" stroke-width="1" />
    <rect x="40" y="2" width="220" height="12" class="stat-bar" fill="url(#hp-grad)" />
    <text x="265" y="12" class="value">999/999</text>

    <!-- MP Gauge -->
    <text x="0" y="37" class="label" fill="#00f0ff">MP</text>
    <rect x="40" y="27" width="220" height="12" rx="3" fill="#151726" stroke="#2b2e4a" stroke-width="1" />
    <rect x="40" y="27" width="220" height="12" class="stat-bar" fill="url(#mp-grad)" />
    <text x="265" y="37" class="value">750/750</text>

    <!-- XP Gauge -->
    <text x="0" y="62" class="label" fill="#ffbf00">XP</text>
    <rect x="40" y="52" width="220" height="12" rx="3" fill="#151726" stroke="#2b2e4a" stroke-width="1" />
    <rect x="40" y="52" width="127" height="12" class="stat-bar" fill="url(#xp-grad)" />
    <text x="265" y="62" class="value">579/1000</text>
  </g>

  <!-- Vertical Divider -->
  <line x1="360" y1="120" x2="360" y2="260" stroke="#2b2e4a" stroke-dasharray="4 4" stroke-width="2" />

  <!-- Right Side: Stats Attributes -->
  <g transform="translate(390, 130)">
    <!-- STR -->
    <text x="0" y="12" class="stat-label">STR (Frontend)</text>
    <text x="130" y="12" class="stat-val">85</text>
    <g transform="translate(160, 4)">
      <rect x="0" y="0" width="10" height="8" fill="#ff007f" rx="1"/>
      <rect x="12" y="0" width="10" height="8" fill="#ff007f" rx="1"/>
      <rect x="24" y="0" width="10" height="8" fill="#ff007f" rx="1"/>
      <rect x="36" y="0" width="10" height="8" fill="#ff007f" rx="1"/>
      <rect x="48" y="0" width="10" height="8" fill="#ff007f" rx="1"/>
      <rect x="60" y="0" width="10" height="8" fill="#ff007f" rx="1"/>
      <rect x="72" y="0" width="10" height="8" fill="#ff007f" rx="1"/>
      <rect x="84" y="0" width="10" height="8" fill="#ff007f" rx="1"/>
      <rect x="96" y="0" width="10" height="8" fill="#1e223d" rx="1"/>
      <rect x="108" y="0" width="10" height="8" fill="#1e223d" rx="1"/>
    </g>

    <!-- AGI -->
    <text x="0" y="37" class="stat-label">AGI (UI/UX Design)</text>
    <text x="130" y="37" class="stat-val">90</text>
    <g transform="translate(160, 29)">
      <rect x="0" y="0" width="10" height="8" fill="#00f0ff" rx="1"/>
      <rect x="12" y="0" width="10" height="8" fill="#00f0ff" rx="1"/>
      <rect x="24" y="0" width="10" height="8" fill="#00f0ff" rx="1"/>
      <rect x="36" y="0" width="10" height="8" fill="#00f0ff" rx="1"/>
      <rect x="48" y="0" width="10" height="8" fill="#00f0ff" rx="1"/>
      <rect x="60" y="0" width="10" height="8" fill="#00f0ff" rx="1"/>
      <rect x="72" y="0" width="10" height="8" fill="#00f0ff" rx="1"/>
      <rect x="84" y="0" width="10" height="8" fill="#00f0ff" rx="1"/>
      <rect x="96" y="0" width="10" height="8" fill="#00f0ff" rx="1"/>
      <rect x="108" y="0" width="10" height="8" fill="#1e223d" rx="1"/>
    </g>

    <!-- INT -->
    <text x="0" y="62" class="stat-label">INT (AI &amp; Logic)</text>
    <text x="130" y="62" class="stat-val">88</text>
    <g transform="translate(160, 54)">
      <rect x="0" y="0" width="10" height="8" fill="#39ff14" rx="1"/>
      <rect x="12" y="0" width="10" height="8" fill="#39ff14" rx="1"/>
      <rect x="24" y="0" width="10" height="8" fill="#39ff14" rx="1"/>
      <rect x="36" y="0" width="10" height="8" fill="#39ff14" rx="1"/>
      <rect x="48" y="0" width="10" height="8" fill="#39ff14" rx="1"/>
      <rect x="60" y="0" width="10" height="8" fill="#39ff14" rx="1"/>
      <rect x="72" y="0" width="10" height="8" fill="#39ff14" rx="1"/>
      <rect x="84" y="0" width="10" height="8" fill="#39ff14" rx="1"/>
      <rect x="96" y="0" width="10" height="8" fill="#1e223d" rx="1"/>
      <rect x="108" y="0" width="10" height="8" fill="#1e223d" rx="1"/>
    </g>

    <!-- DEF -->
    <text x="0" y="87" class="stat-label">DEF (Testing/Sec)</text>
    <text x="130" y="87" class="stat-val">75</text>
    <g transform="translate(160, 79)">
      <rect x="0" y="0" width="10" height="8" fill="#7000ff" rx="1"/>
      <rect x="12" y="0" width="10" height="8" fill="#7000ff" rx="1"/>
      <rect x="24" y="0" width="10" height="8" fill="#7000ff" rx="1"/>
      <rect x="36" y="0" width="10" height="8" fill="#7000ff" rx="1"/>
      <rect x="48" y="0" width="10" height="8" fill="#7000ff" rx="1"/>
      <rect x="60" y="0" width="10" height="8" fill="#7000ff" rx="1"/>
      <rect x="72" y="0" width="10" height="8" fill="#7000ff" rx="1"/>
      <rect x="84" y="0" width="10" height="8" fill="#1e223d" rx="1"/>
      <rect x="96" y="0" width="10" height="8" fill="#1e223d" rx="1"/>
      <rect x="108" y="0" width="10" height="8" fill="#1e223d" rx="1"/>
    </g>

    <!-- LUK -->
    <text x="0" y="112" class="stat-label">LUK (Startup Luck)</text>
    <text x="130" y="112" class="stat-val">95</text>
    <g transform="translate(160, 104)">
      <rect x="0" y="0" width="10" height="8" fill="#ffbf00" rx="1"/>
      <rect x="12" y="0" width="10" height="8" fill="#ffbf00" rx="1"/>
      <rect x="24" y="0" width="10" height="8" fill="#ffbf00" rx="1"/>
      <rect x="36" y="0" width="10" height="8" fill="#ffbf00" rx="1"/>
      <rect x="48" y="0" width="10" height="8" fill="#ffbf00" rx="1"/>
      <rect x="60" y="0" width="10" height="8" fill="#ffbf00" rx="1"/>
      <rect x="72" y="0" width="10" height="8" fill="#ffbf00" rx="1"/>
      <rect x="84" y="0" width="10" height="8" fill="#ffbf00" rx="1"/>
      <rect x="96" y="0" width="10" height="8" fill="#ffbf00" rx="1"/>
      <rect x="108" y="0" width="10" height="8" fill="#1e223d" rx="1"/>
    </g>
  </g>
</svg>
